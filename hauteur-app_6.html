<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Saut en hauteur — Planning coach</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#0f0f13;color:#e8e8f0;font-size:15px}
:root{
  --ppg:#7B74E8;--ppg-bg:#2A2756;--ppg-bd:#4B46A0;--ppg-tx:#C4C0F8;
  --ppo:#2DB87A;--ppo-bg:#0F3326;--ppo-bd:#1A7A50;--ppo-tx:#7DDDB0;
  --pps:#E87040;--pps-bg:#3A1A0A;--pps-bd:#A04020;--pps-tx:#F4A07A;
  --comp:#E8A030;--comp-bg:#3A2800;--comp-bd:#A07020;--comp-tx:#F4C870;
  --rest:#888;--rest-bg:#1E1E22;--rest-bd:#444;--rest-tx:#aaa;
  --blue:#4D9CFF;--blue-dark:#1A5FBF;
  --bg:#0f0f13;--bg2:#16161c;--bg3:#1e1e26;--bg4:#26262f;
  --border:#2a2a35;--border2:#353542;
  --text:#e8e8f0;--text2:#9090a8;--text3:#606078;
}
.layout{display:flex;min-height:100vh}
.sidebar{width:224px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
.logo{padding:20px 18px 16px;border-bottom:1px solid var(--border)}
.logo-t{font-size:14px;font-weight:700;color:var(--text);letter-spacing:-.2px}
.logo-s{font-size:11px;color:var(--text3);margin-top:3px;letter-spacing:.02em}
.nav-sec{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;padding:16px 18px 5px}
.nav-it{display:flex;align-items:center;gap:10px;padding:10px 18px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border-left:2px solid transparent;transition:all .12s;user-select:none}
.nav-it:hover{background:var(--bg3);color:var(--text)}
.nav-it.on{color:var(--blue);background:rgba(77,156,255,.08);border-left-color:var(--blue)}
.nav-ic{width:15px;height:15px;flex-shrink:0;opacity:.8}
.nav-it.on .nav-ic{opacity:1}
.main{flex:1;padding:32px 36px;overflow-y:auto;max-width:1100px}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:10px}
.pt{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.4px}
.btn{padding:9px 18px;border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);transition:all .12s;font-family:inherit;letter-spacing:-.1px}
.btn:hover{background:var(--bg4);border-color:var(--border2);color:var(--text)}
.btn-p{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-p:hover{background:#3a8af0;border-color:#3a8af0}
.btn-d{color:#f06060;border-color:#4a2020}
.btn-d:hover{background:#2a1010}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:22px 26px;margin-bottom:14px}
.bdg{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:99px;letter-spacing:.02em}
.bdg-ppg{background:var(--ppg-bg);color:var(--ppg-tx);border:1px solid var(--ppg-bd)}
.bdg-ppo{background:var(--ppo-bg);color:var(--ppo-tx);border:1px solid var(--ppo-bd)}
.bdg-pps{background:var(--pps-bg);color:var(--pps-tx);border:1px solid var(--pps-bd)}
.bdg-comp{background:var(--comp-bg);color:var(--comp-tx);border:1px solid var(--comp-bd)}
.bdg-rest{background:var(--rest-bg);color:var(--rest-tx);border:1px solid var(--rest-bd)}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.sv{font-size:26px;font-weight:700;color:var(--text);letter-spacing:-.5px}
.sl2{font-size:10px;color:var(--text3);margin-top:4px;font-weight:500;letter-spacing:.04em;text-transform:uppercase}
.ac{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;text-align:center;transition:all .12s;margin-bottom:8px}
.ac:hover{border-color:var(--border2);background:var(--bg3)}
.ac.on{border:1px solid var(--blue);background:rgba(77,156,255,.06)}
.av{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;margin:0 auto 10px}
.av-b{background:#1A3A6A;color:#7BB8F8}
.av-c{background:#3A1820;color:#F48090}
.av-t{background:#0A2E20;color:#60D4A0}
.av-p{background:#28204A;color:#B4A0F8}
.pl{display:grid;grid-template-columns:230px 1fr;gap:16px}
.sec-lbl{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:12px}
.ig{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.ib{background:var(--bg3);border-radius:9px;padding:11px 14px;border:1px solid var(--border)}
.il{font-size:10px;color:var(--text3);margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.05em}
.iv{font-size:15px;font-weight:600;color:var(--text)}
.prr{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--bg3);border-radius:9px;margin-bottom:6px;border:1px solid var(--border)}
.prv{font-size:14px;font-weight:700;color:var(--blue)}
.tabs{display:flex;gap:2px;margin-bottom:22px;border-bottom:1px solid var(--border)}
.tab{padding:10px 18px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s;font-family:inherit}
.tab:hover{color:var(--text)}
.tab.on{color:var(--blue);border-bottom-color:var(--blue)}
.wg{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.dh{text-align:center;font-size:11px;color:var(--text3);padding:6px 0;font-weight:600;letter-spacing:.04em}
.dc{border-radius:10px;min-height:68px;padding:8px;border:1px solid var(--border);cursor:pointer;background:var(--bg3);transition:all .12s}
.dc:hover{border-color:var(--border2)}
.dc-ppg{background:var(--ppg-bg);border-color:var(--ppg-bd)}
.dc-ppo{background:var(--ppo-bg);border-color:var(--ppo-bd)}
.dc-pps{background:var(--pps-bg);border-color:var(--pps-bd)}
.dc-comp{background:var(--comp-bg);border-color:var(--comp-bd)}
.dc-rest{background:var(--rest-bg);border-color:var(--rest-bd)}
.dc-emp{background:transparent;border-color:transparent;cursor:default}
.dn{font-size:13px;font-weight:600}
.dt{font-size:10px;font-weight:600;margin-top:3px}
.dot{width:5px;height:5px;border-radius:50%;margin:5px auto 0}
.sr{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;transition:all .12s}
.sr:hover{border-color:var(--border2);background:var(--bg4)}
.sd{font-size:12px;color:var(--text3);min-width:76px;flex-shrink:0}
.st{font-size:14px;font-weight:500;flex:1;cursor:pointer;color:var(--text)}
.bb{display:flex;align-items:center;gap:6px;background:transparent;border:none;color:var(--blue);font-size:13px;cursor:pointer;padding:0;margin-bottom:18px;font-weight:500;font-family:inherit}
.eg{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:12px;margin-top:12px}
.ec{background:var(--bg3);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.em{width:100%;height:112px;background:var(--bg4);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.em img{width:100%;height:100%;object-fit:cover}
.ep{display:flex;flex-direction:column;align-items:center;gap:5px;color:var(--text3);font-size:11px}
.vb{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.7);color:#fff;font-size:10px;padding:2px 8px;border-radius:99px}
.eb{padding:10px 14px}
.en{font-size:13px;font-weight:600;color:var(--text)}
.ed2{font-size:11px;color:var(--text2);margin-top:3px}
.s3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.pb{display:flex;height:6px;border-radius:99px;overflow:hidden;margin-bottom:22px;gap:1px}
.ps{height:100%;border-radius:99px}
.mb{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px 24px;margin-bottom:14px}
.mt2{font-size:15px;font-weight:600;color:var(--text);margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;letter-spacing:-.2px}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.ch{text-align:center;font-size:10px;color:var(--text3);padding:5px 0;font-weight:600;letter-spacing:.05em}
.cd{border-radius:8px;min-height:50px;padding:6px;border:1px solid var(--border);cursor:pointer;background:var(--bg3);transition:all .12s}
.cd:hover{border-color:var(--border2)}
.cd-ppg{background:var(--ppg-bg);border-color:var(--ppg-bd)}
.cd-ppo{background:var(--ppo-bg);border-color:var(--ppo-bd)}
.cd-pps{background:var(--pps-bg);border-color:var(--pps-bd)}
.cd-comp{background:var(--comp-bg);border-color:var(--comp-bd)}
.cd-rest{background:var(--rest-bg);border-color:var(--rest-bd)}
.cd-emp{background:transparent;border-color:transparent;cursor:default}
.today{outline:2px solid var(--blue);outline-offset:1px;border-radius:8px}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;backdrop-filter:blur(4px)}
.md{background:var(--bg2);border:1px solid var(--border2);border-radius:18px;padding:28px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto}
.mdtt{font-size:17px;font-weight:700;margin-bottom:22px;color:var(--text);letter-spacing:-.3px}
.fg{margin-bottom:16px}
.fg label{font-size:11px;color:var(--text3);display:block;margin-bottom:6px;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 13px;border:1px solid var(--border2);border-radius:9px;font-size:14px;color:var(--text);background:var(--bg3);outline:none;transition:border .12s;font-family:inherit}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--blue)}
.fg input::placeholder{color:var(--text3)}
.fg textarea{resize:vertical;min-height:70px}
.fg select option{background:var(--bg2);color:var(--text)}
.fgr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.br{display:flex;gap:10px;margin-top:10px}
.uz{border:1px dashed var(--border2);border-radius:9px;padding:14px;text-align:center;cursor:pointer;font-size:13px;color:var(--text3);transition:all .12s;display:block;width:100%}
.uz:hover{background:var(--bg3);border-color:var(--blue)}
.ip{width:100%;height:88px;object-fit:cover;border-radius:8px;margin-top:8px}
.warn{background:rgba(200,50,50,.12);border:1px solid rgba(200,50,50,.3);border-radius:9px;padding:14px;margin-bottom:16px;font-size:13px;color:#f08080;line-height:1.6}
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty p{font-size:14px;margin-bottom:6px}
@media(max-width:768px){
  .sidebar{width:58px}
  .logo-t,.logo-s,.nav-sec,.nav-it span{display:none}
  .nav-it{justify-content:center;padding:14px}
  .main{padding:18px 14px}
  .sg{grid-template-columns:repeat(2,1fr)}
  .pl{grid-template-columns:1fr}
  .eg{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
function lsGet(k,def){try{const v=localStorage.getItem(k);return v?JSON.parse(v):def();}catch{return def();}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function iso(d){return d.toISOString().split('T')[0];}
function addD(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function monOf(d){const r=new Date(d);const dw=r.getDay();r.setDate(r.getDate()+(dw===0?-6:1-dw));return r;}
function calcAge(dob){const d=new Date(dob),n=new Date();let a=n.getFullYear()-d.getFullYear();if(n<new Date(n.getFullYear(),d.getMonth(),d.getDate()))a--;return a;}
function ini(p,n){return(p[0]+n[0]).toUpperCase();}
const TODAY=iso(new Date());
const JOURS=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
const MOIS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const AVC=['av-b','av-c','av-t','av-p'];
const PH={ppg:{l:'PPG',col:'#7B74E8'},ppo:{l:'PPO',col:'#2DB87A'},pps:{l:'PPS',col:'#E87040'},comp:{l:'Compét',col:'#E8A030'},rest:{l:'Repos',col:'#666'},'':{}};
const CAL_START=new Date('2026-04-20');
const WPLAN=[
  {p:'ppg',s:[1,3,5],n:'Force générale'},{p:'ppg',s:[1,3,5],n:'Squat, fentes, gainage'},
  {p:'ppg',s:[1,3,6],n:'Plyométrie légère'},{p:'ppg',s:[1,3,5],n:'Transition PPG→PPO'},
  {p:'ppo',s:[1,3,5],n:'Sauts en boîte'},{p:'ppo',s:[1,3,5],n:'Force orientée'},
  {p:'ppo',s:[2,4,6],n:'Appui Fosbury'},{p:'rest',s:[],n:'Récupération active'},
  {p:'ppo',s:[1,3,5],n:'PPO + intro PPS'},{p:'pps',s:[1,3,5,6],n:'Approche, impulsion'},
  {p:'pps',s:[1,3,5,6],n:'Approche complète'},{p:'pps',s:[1,3,5,6],n:'Essais progressifs'},
  {p:'pps',s:[1,3,5],n:'Affinage technique'},{p:'comp',s:[3,6],n:'Compétition + récup'},
  {p:'pps',s:[1,3,5],n:'Retour post-compét'},{p:'comp',s:[6],n:'Compétition principale'},
  {p:'rest',s:[],n:'Repos, bilan saison'},
];
const DEFLIB=[
  {id:1,name:'Squat',phase:'ppg',sets:4,reps:'8',notes:'70% 1RM',videoUrl:''},
  {id:2,name:'Fentes marchées',phase:'ppg',sets:3,reps:'12/jambe',notes:'',videoUrl:''},
  {id:3,name:'Gainage latéral',phase:'ppg',sets:3,reps:'30s',notes:'',videoUrl:''},
  {id:4,name:'Sauts en boîte',phase:'ppo',sets:4,reps:'6',notes:'Box 60cm',videoUrl:''},
  {id:5,name:'Foulées bondissantes',phase:'ppo',sets:3,reps:'20m',notes:'',videoUrl:''},
  {id:6,name:'Fosbury approche courte',phase:'pps',sets:5,reps:'3 sauts',notes:'Barre 1m70',videoUrl:''},
  {id:7,name:'Impulsion sur haie',phase:'pps',sets:4,reps:'8',notes:'Genou haut',videoUrl:''},
  {id:8,name:'Saut complet',phase:'pps',sets:3,reps:'3 essais',notes:'',videoUrl:''},
];
function buildDD(){
  const data={};let mon=monOf(CAL_START);
  WPLAN.forEach((wp,wi)=>{for(let d=0;d<7;d++){const k=iso(addD(mon,wi*7+d));data[k]={phase:wp.p,hasSession:wp.s.includes(d+1),notes:wp.n,weekIdx:wi};}});
  return data;
}
function bdg(ph){if(!ph||!PH[ph]||!PH[ph].l) return '';return`<span class="bdg bdg-${ph}">${PH[ph].l}</span>`;}
function stars(n,col){
  if(!n) return '';
  const c=col||'#E8C030';
  return Array.from({length:4},(_,i)=>i<n?`<span style="color:${c};font-size:10px">★</span>`:`<span style="color:#2a2a35;font-size:10px">★</span>`).join('');
}
function starsInput(cur,fieldId){
  const c=cur||0;
  const fid=fieldId||'star-field';
  const labels=['','Légère','Modérée','Intense','Maximale'];
  return`<div style="display:flex;gap:4px;align-items:center;margin-top:6px">
    ${[1,2,3,4].map(n=>`<button type="button" class="star-btn" data-star="${n}" data-field="${fid}" style="font-size:26px;background:none;border:none;cursor:pointer;line-height:1;color:${c>=n?'#E8C030':'#2e2e3a'};transition:color .1s;padding:0">${c>=n?'★':'☆'}</button>`).join('')}
    <span style="font-size:12px;color:var(--text3);margin-left:6px">${c?labels[c]:''}</span>
  </div>`;
}

function phOpts(val){
  return['ppg','ppo','pps','comp','rest',''].map(p=>`<option value="${p}"${val===p?' selected':''}>${p==='ppg'?'PPG — Général':p==='ppo'?'PPO — Orienté':p==='pps'?'PPS — Spécifique':p==='comp'?'Compétition':p==='rest'?'Repos':'Non planifié'}</option>`).join('');
}

let S={
  page:'membres',
  athletes:lsGet('h_ath',()=>[]),
  sessions:lsGet('h_ses',()=>[]),
  library:lsGet('h_lib',()=>DEFLIB),
  dd:lsGet('h_dd',buildDD),
  dd2:lsGet('h_dd2',buildDD),
  imgs:lsGet('h_img',()=>({})),
  nAId:lsGet('h_nai',()=>1),
  nSId:lsGet('h_nsi',()=>1),
  nEId:lsGet('h_nei',()=>1),
  nLId:lsGet('h_nli',()=>20),
  selAt:null,selSes:null,modal:null,mData:{},
  collapse:{},libF:'',sesTab:'liste',libPick:false,
  newPrs:[{label:'Meilleur saut',val:''}],
};
function save(){
  lsSet('h_ath',S.athletes);lsSet('h_ses',S.sessions);lsSet('h_lib',S.library);
  lsSet('h_dd',S.dd);lsSet('h_dd2',S.dd2);lsSet('h_img',S.imgs);
  lsSet('h_nai',S.nAId);lsSet('h_nsi',S.nSId);lsSet('h_nei',S.nEId);lsSet('h_nli',S.nLId);
}
function R(){document.getElementById('app').innerHTML=renderApp();bind();}

const ICO={
  users:`<svg class="nav-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="7" r="3"/><path d="M3 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/><path d="M16 3.13a4 4 0 010 7.75"/><path d="M21 21v-2a4 4 0 00-3-3.87"/></svg>`,
  cal:`<svg class="nav-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`,
  grid:`<svg class="nav-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>`,
  cal2:`<svg class="nav-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>`,
  book:`<svg class="nav-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>`,
};
function ni(id,icon,lbl){return`<div class="nav-it${S.page===id?' on':''}" data-nav="${id}">${ICO[icon]||''}<span>${lbl}</span></div>`;}

function renderApp(){
  const page=S.page==='membres'?rMembres():S.page==='seances'?rSeances():S.page==='bibliotheque'?rBib():S.page==='planning'?rPlanning():rCal();
  const modal=S.modal==='reset'?rResetModal():'';
  return`${modal}<div class="layout">
    <div class="sidebar">
      <div class="logo"><div class="logo-t">⬆ Saut en hauteur</div><div class="logo-s">Planning coach</div></div>
      <div class="nav-sec">Groupe</div>${ni('membres','users','Membres')}
      <div class="nav-sec">Entraînement</div>${ni('seances','cal','Séances')}${ni('bibliotheque','book','Bibliothèque')}
      <div class="nav-sec">Saison</div>${ni('planning','grid','Planning macro')}${ni('calendrier','cal2','Calendrier saison')}
      <div style="margin-top:auto;padding:12px 16px;border-top:1px solid var(--border)"><button class="btn btn-d" style="width:100%;font-size:12px;padding:7px" id="btn-reset">Réinitialiser</button></div>
    </div>
    <div class="main">${page}</div>
  </div>`;
}

// ── MEMBRES ───────────────────────────────────────────────────────
function rMembres(){
  const at=S.athletes.find(a=>a.id===S.selAt);
  const atModal=S.modal==='newAt'||S.modal==='editAt'?rAtModal():'';
  return`${atModal}<div class="ph"><div class="pt">Membres</div><button class="btn btn-p" id="btn-newat">+ Ajouter</button></div>
  <div class="pl">
    <div>

// ── PLANNING MACRO ────────────────────────────────────────────────
function rPlanning(){
  const weeks=buildWeeks();const months=groupMonths(weeks);
  const c=countPh(weeks,S.dd);
  const segs=weeks.map(w=>{const d=S.dd[iso(w.mon)];const col=d&&PH[d.phase]?PH[d.phase].col:'#333';return`<div class="ps" style="flex:1;background:${col}"></div>`;}).join('');
  const wkMod=S.modal==='editWk'?rWkMod():'';
  return`${wkMod}<div class="ph"><div class="pt">Planning macro — 4 mois</div></div>
  <div class="sg">
    <div class="sc"><div class="sv">${weeks.length}</div><div class="sl2">Semaines</div></div>
    <div class="sc"><div class="sv" style="color:var(--ppg)">${c.ppg}</div><div class="sl2">PPG</div></div>
    <div class="sc"><div class="sv" style="color:var(--ppo)">${c.ppo}</div><div class="sl2">PPO</div></div>
    <div class="sc"><div class="sv" style="color:var(--pps)">${c.pps}</div><div class="sl2">PPS</div></div>
  </div>
  <div class="pb">${segs}</div>
  ${months.map(m=>{
    const open=!S.collapse[m.key];
    const phM=['ppg','ppo','pps','comp','rest'].filter(p=>m.weeks.some(w=>(S.dd[iso(w.mon)]||{}).phase===p));
    const cells=m.weeks.map(w=>{
      const k=iso(w.mon);const d=S.dd[k]||{phase:'',notes:''};const ph=PH[d.phase]||{};
      const sc=Object.keys(S.dd).filter(kk=>S.dd[kk].weekIdx===d.weekIdx&&S.dd[kk].hasSession).length;
      return`<div class="cd${d.phase?' cd-'+d.phase:''}" data-editwk="${k}" style="min-height:58px">
        <div style="font-size:10px;color:var(--text3)">S${w.wn}</div>
        <div style="font-size:12px;font-weight:700;color:${ph.col||'var(--text3)'};margin-top:3px">${ph.l||'—'}</div>
        ${d.intensite?`<div style="font-size:10px;margin-top:3px;line-height:1">${stars(d.intensite,ph.col)}</div>`:''}
        ${sc?`<div style="font-size:10px;color:var(--text3);margin-top:2px">${sc}j</div>`:''}
      </div>`;
    }).join('');
    return`<div class="mb">
      <div class="mt2" data-collapse="${m.key}">
        <span>${m.label}</span>
        <div style="display:flex;gap:6px;align-items:center">${phM.map(p=>bdg(p)).join('')}<span style="font-size:12px;color:var(--text3);margin-left:4px">${open?'▲':'▼'}</span></div>
      </div>
      ${open?`<div class="cg" style="grid-template-columns:repeat(${Math.min(m.weeks.length,4)},1fr)">${cells}</div>`:''}
    </div>`;
  }).join('')}`;
}

// ── CALENDRIER ────────────────────────────────────────────────────
function rCal(){
  const allD=Object.keys(S.dd2).sort();
  const segs=allD.map(k=>{const d=S.dd2[k];const col=d&&PH[d.phase]?PH[d.phase].col:'#333';return`<div class="ps" style="flex:1;background:${col}"></div>`;}).join('');
  const c=countPhD(S.dd2);
  const calMs=buildCalMs(S.dd2);
  const dayMod=S.modal==='editDay'?rDayMod():'';
  return`${dayMod}<div class="ph">
    <div class="pt">Calendrier de saison</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">${['ppg','ppo','pps','comp','rest'].map(p=>bdg(p)).join('')}</div>
  </div>
  <div class="sg">
    <div class="sc"><div class="sv">${WPLAN.length}</div><div class="sl2">Semaines</div></div>
    <div class="sc"><div class="sv" style="color:var(--ppg)">${c.ppg}</div><div class="sl2">PPG</div></div>
    <div class="sc"><div class="sv" style="color:var(--ppo)">${c.ppo}</div><div class="sl2">PPO</div></div>
    <div class="sc"><div class="sv" style="color:var(--pps)">${c.pps}</div><div class="sl2">PPS</div></div>
  </div>
  <div class="pb">${segs}</div>
  ${calMs.map(m=>{
    const fd=new Date(m.y,m.m,1).getDay();const off=fd===0?6:fd-1;
    const dim=new Date(m.y,m.m+1,0).getDate();
    let cells='';
    for(let i=0;i<off;i++) cells+=`<div class="cd cd-emp"></div>`;
    for(let day=1;day<=dim;day++){
      const k=iso(new Date(m.y,m.m,day));const dd=S.dd2[k];const ph=dd?PH[dd.phase]:null;
      cells+=`<div class="cd${ph?' cd-'+dd.phase:''}${k===TODAY?' today':''}" ${dd?`data-editday="${k}"`:''}style="min-height:50px">
        <div style="font-size:12px;font-weight:600;color:${ph?ph.col:'var(--text3)'}">${day}</div>
        ${ph&&dd.phase?`<div style="font-size:9px;font-weight:700;color:${ph.col};margin-top:2px">${ph.l}</div>`:''}
        ${dd&&dd.intensite?`<div style="font-size:9px;line-height:1;margin-top:2px">${stars(dd.intensite,ph?ph.col:'#E8C030')}</div>`:dd&&dd.hasSession?`<div class="dot" style="background:${ph?ph.col:'#666'}"></div>`:''}
      </div>`;
    }
    return`<div class="mb">
      <div class="mt2" style="cursor:default">${MOIS[m.m]} ${m.y}</div>
      <div class="cg">${JOURS.map(j=>`<div class="ch">${j}</div>`).join('')}${cells}</div>
    </div>`;
  }).join('')}`;
}
function rDayMod(){
  const d=S.dd2[S.mData.dayIso]||{phase:'ppg',hasSession:false,notes:'',intensite:0};
  S.mData.starVal=d.intensite||0;
  const lbl=new Date(S.mData.dayIso+'T12:00:00').toLocaleDateString('fr-BE',{weekday:'long',day:'numeric',month:'long'});
  return`<div class="ov"><div class="md">
    <div class="mdtt">${lbl.charAt(0).toUpperCase()+lbl.slice(1)}</div>
    <div class="fg"><label>Phase</label><select id="ed-p">${phOpts(d.phase)}</select></div>
    <div class="fg"><label>Séance ce jour</label><select id="ed-s"><option value="1"${d.hasSession?' selected':''}>Oui</option><option value="0"${!d.hasSession?' selected':''}>Non</option></select></div>
    <div class="fg"><label>Intensité prévue</label>
      <div id="star-field-day">${starsInput(d.intensite||0,'star-field-day')}</div>
    </div>
    <div class="fg"><label>Notes</label><textarea id="ed-no">${d.notes||''}</textarea></div>
    <div class="br"><button class="btn" style="flex:1" id="btn-cancelday">Annuler</button><button class="btn btn-p" style="flex:1" id="btn-saveday">Enregistrer</button></div>
  </div></div>`;
}
function rResetModal(){
  return`<div class="ov"><div class="md">
    <div class="mdtt">Réinitialiser l'application</div>
    <div class="warn">⚠ Cette action effacera définitivement tous tes athlètes, séances, exercices et planning. Action irréversible.</div>
    <div class="fg"><label>Tape <strong>reset</strong> pour confirmer</label><input id="rst-inp" placeholder="reset"/></div>
    <div class="br"><button class="btn" style="flex:1" id="btn-cancelrst">Annuler</button><button class="btn btn-d" style="flex:1" id="btn-confirmrst">Tout effacer</button></div>
  </div></div>`;
}

// ── UTILS ─────────────────────────────────────────────────────────
function buildWeeks(){const ws=[];let mon=monOf(CAL_START);const end=addD(CAL_START,17*7+7);let wn=1;while(mon<end){ws.push({id:iso(mon),wn,mon:new Date(mon)});mon=addD(mon,7);wn++;}return ws;}
function groupMonths(weeks){const ms=[];let cur=null;weeks.forEach(w=>{const m=w.mon.getMonth(),y=w.mon.getFullYear(),k=`${y}-${m}`;if(!cur||cur.key!==k){cur={key:k,label:w.mon.toLocaleDateString('fr-BE',{month:'long',year:'numeric'}),weeks:[]};ms.push(cur);}cur.weeks.push(w);});return ms;}
function buildCalMs(dd){const ms=[];let cur=null;Object.keys(dd).sort().forEach(k=>{const d=new Date(k+'T12:00:00'),m=d.getMonth(),y=d.getFullYear(),key=`${y}-${m}`;if(!cur||cur.key!==key){cur={key,y,m};ms.push(cur);}});return ms;}
function countPh(weeks,dd){const c={ppg:0,ppo:0,pps:0,comp:0,rest:0};const seen=new Set();weeks.forEach(w=>{const d=dd[iso(w.mon)];if(d&&!seen.has(d.weekIdx)){seen.add(d.weekIdx);if(c[d.phase]!==undefined)c[d.phase]++;}});return c;}
function countPhD(dd){const c={ppg:0,ppo:0,pps:0,comp:0,rest:0};const seen=new Set();Object.values(dd).forEach(d=>{if(!seen.has(d.weekIdx)){seen.add(d.weekIdx);if(c[d.phase]!==undefined)c[d.phase]++;}});return c;}
function getPrs(){const w=document.getElementById('prs-wrap');if(!w) return[];const rows=w.querySelectorAll('.fgr');const prs=[];rows.forEach((_,i)=>{const l=document.getElementById(`prl-${i}`);const vv=document.getElementById(`prv-${i}`);if(l&&vv&&l.value.trim()) prs.push({label:l.value.trim(),val:vv.value.trim()});});return prs;}
function addPrRow(){const w=document.getElementById('prs-wrap');if(!w) return;const i=w.querySelectorAll('.fgr').length;const d=document.createElement('div');d.className='fgr';d.style.marginBottom='8px';d.innerHTML=`<input id="prl-${i}" placeholder="Label"/><input id="prv-${i}" placeholder="1m80"/>`;w.appendChild(d);}

// ── BIND ──────────────────────────────────────────────────────────
function bindStars(){
  document.querySelectorAll('.star-btn').forEach(el=>el.addEventListener('click',()=>{
    const n=parseInt(el.dataset.star);
    const fid=el.dataset.field||'star-field';
    S.mData.starVal=(S.mData.starVal===n?0:n);
    const sf=document.getElementById(fid);
    if(sf){sf.innerHTML=starsInput(S.mData.starVal,fid);bindStars();}
  }));
}
function bind(){
  document.querySelectorAll('[data-nav]').forEach(el=>el.addEventListener('click',()=>{S.page=el.dataset.nav;S.modal=null;S.selSes=null;S.libPick=false;R();}));
  q('btn-reset',()=>{S.modal='reset';R();});
  q('btn-cancelrst',()=>{S.modal=null;R();});
  q('btn-confirmrst',()=>{if((gv('rst-inp')||'').toLowerCase()!=='reset') return;['h_ath','h_ses','h_lib','h_dd','h_dd2','h_img','h_nai','h_nsi','h_nei','h_nli'].forEach(k=>localStorage.removeItem(k));window.location.reload();});
  // membres
  q('btn-newat',()=>{S.modal='newAt';S.newPrs=[{label:'Meilleur saut',val:''}];R();});
  document.querySelectorAll('[data-selat]').forEach(el=>el.addEventListener('click',()=>{S.selAt=parseInt(el.dataset.selat);R();}));
  q('btn-editat',()=>{const at=S.athletes.find(a=>a.id===S.selAt);if(!at) return;S.newPrs=at.prs.map(p=>({...p}));S.modal='editAt';R();});
  q('btn-cancelat',()=>{S.modal=null;R();});
  q('btn-delat',()=>{if(confirm('Supprimer cet athlète ?')){S.athletes=S.athletes.filter(a=>a.id!==S.selAt);S.selAt=null;S.modal=null;save();R();}});
  q('btn-addpr',()=>addPrRow());
  q('btn-saveat',()=>{
    const p=gv('f-p'),n=gv('f-n'),d=gv('f-d');if(!p||!n||!d) return;
    const prs=getPrs();
    if(S.modal==='newAt'){S.athletes.push({id:S.nAId,prenom:p,nom:n,dob:d,color:AVC[S.nAId%AVC.length],prs});S.selAt=S.nAId;S.nAId++;}
    else{S.athletes=S.athletes.map(a=>a.id===S.selAt?{...a,prenom:p,nom:n,dob:d,prs}:a);}
    S.modal=null;save();R();
  });
  // séances
  document.querySelectorAll('[data-sestab]').forEach(el=>el.addEventListener('click',()=>{S.sesTab=el.dataset.sestab;R();}));
  document.querySelectorAll('[data-openses]').forEach(el=>el.addEventListener('click',()=>{S.selSes=parseInt(el.dataset.openses);S.modal=null;R();}));
  document.querySelectorAll('[data-delses]').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation();const sid=parseInt(el.dataset.delses);
    if(confirm('Supprimer cette séance ?')){S.sessions=S.sessions.filter(x=>x.id!==sid);save();R();}
  }));
  document.querySelectorAll('[data-dupses]').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation();const s=S.sessions.find(x=>x.id===parseInt(el.dataset.dupses));if(!s) return;
    const newEx=s.exercises.map((ex,i)=>{const nid=S.nEId+i;if(S.imgs[ex.id]) S.imgs[nid]=S.imgs[ex.id];return{...ex,id:nid};});
    S.nEId+=newEx.length;S.sessions.push({...s,id:S.nSId,title:s.title+' (copie)',exercises:newEx});S.nSId++;save();R();
  }));
  q('btn-newses',()=>{S.mData.starVal=0;S.modal='newSes';R();});
  q('btn-cancelses',()=>{S.modal=null;S.mData.starVal=0;R();});
  bindStars();
  q('btn-saveses',()=>{
    const t=gv('ns-t');if(!t) return;
    const d=gv('ns-d')||iso(new Date());
    const p=document.getElementById('ns-p')?.value||'ppg';
    const n=gv('ns-n')||'';
    const iv=S.mData.starVal||0;
    S.sessions.push({id:S.nSId,date:d,title:t,phase:p,notes:n,intensite:iv,exercises:[]});
    S.nSId++;S.modal=null;save();R();
  });
  q('btn-back',()=>{S.selSes=null;S.modal=null;S.libPick=false;R();});
  q('btn-delses',()=>{if(confirm('Supprimer cette séance définitivement ?')){S.sessions=S.sessions.filter(x=>x.id!==S.selSes);S.selSes=null;save();R();}});
  q('btn-fromlib',()=>{S.libPick=true;R();});
  q('btn-closelp',()=>{S.libPick=false;R();});
  const lpOv=document.getElementById('lp-ov');
  if(lpOv) lpOv.addEventListener('click',e=>{if(e.target===lpOv){S.libPick=false;R();}});
  document.querySelectorAll('[data-importex]').forEach(el=>el.addEventListener('click',()=>{
    const ex=S.library.find(e=>e.id===parseInt(el.dataset.importex));if(!ex||S.selSes===null) return;
    const eid=S.nEId;
    S.sessions=S.sessions.map(x=>x.id===S.selSes?{...x,exercises:[...x.exercises,{id:eid,name:ex.name,sets:ex.sets,reps:ex.reps,notes:ex.notes,videoUrl:ex.videoUrl||'',img:''}]}:x);
    S.nEId++;S.libPick=false;save();R();
  }));
  q('btn-newex',()=>{S.modal='newEx';R();});
  q('btn-cancelex',()=>{S.modal=null;R();});
  const neImg=document.getElementById('ne-img');
  if(neImg) neImg.addEventListener('change',e=>{const f=e.target.files[0];if(!f) return;const r=new FileReader();r.onload=ev=>{const p=document.getElementById('ne-prev');if(p){p.src=ev.target.result;p.style.display='block';}};r.readAsDataURL(f);});
  q('btn-saveex',()=>{
    const n=gv('ne-n');if(!n) return;
    const eid=S.nEId;
    S.sessions=S.sessions.map(x=>x.id===S.selSes?{...x,exercises:[...x.exercises,{id:eid,name:n,sets:parseInt(gv('ne-s'))||3,reps:gv('ne-r')||'8',notes:gv('ne-no')||'',videoUrl:gv('ne-v')||'',img:''}]}:x);
    const prev=document.getElementById('ne-prev');
    if(prev&&prev.src&&prev.style.display!=='none') S.imgs[eid]=prev.src;
    S.nEId++;S.modal=null;save();R();
  });
  document.querySelectorAll('[data-imgex]').forEach(el=>el.addEventListener('change',e=>{
    const f=e.target.files[0];if(!f) return;const eid=parseInt(el.dataset.imgex);
    const r=new FileReader();r.onload=ev=>{S.imgs[eid]=ev.target.result;save();R();};r.readAsDataURL(f);
  }));
  // bibliothèque
  document.querySelectorAll('[data-libf]').forEach(el=>el.addEventListener('click',()=>{S.libF=el.dataset.libf;R();}));
  q('btn-newlib',()=>{S.modal='newLib';S.mData={};R();});
  q('btn-cancellib',()=>{S.modal=null;R();});
  q('btn-savelib',()=>{
    const n=gv('lb-n');if(!n) return;
    const ex={name:n,phase:document.getElementById('lb-p')?.value||'ppg',sets:parseInt(gv('lb-s'))||3,reps:gv('lb-r')||'',notes:gv('lb-no')||'',videoUrl:gv('lb-v')||''};
    if(S.modal==='newLib'){S.library.push({id:S.nLId,...ex});S.nLId++;}
    else{S.library=S.library.map(e=>e.id===S.mData.lid?{...e,...ex}:e);}
    S.modal=null;save();R();
  });
  document.querySelectorAll('[data-editlib]').forEach(el=>el.addEventListener('click',()=>{S.modal='editLib';S.mData={lid:parseInt(el.dataset.editlib)};R();}));
  document.querySelectorAll('[data-dellib]').forEach(el=>el.addEventListener('click',()=>{if(confirm('Supprimer cet exercice ?')){S.library=S.library.filter(e=>e.id!==parseInt(el.dataset.dellib));save();R();}}));
  // planning
  document.querySelectorAll('[data-collapse]').forEach(el=>el.addEventListener('click',()=>{const k=el.dataset.collapse;S.collapse[k]=!S.collapse[k];R();}));
  document.querySelectorAll('[data-editwk]').forEach(el=>el.addEventListener('click',()=>{S.modal='editWk';S.mData={wkIso:el.dataset.editwk};R();}));
  q('btn-cancelwk',()=>{S.modal=null;R();});
  q('btn-savewk',()=>{
    const ph=document.getElementById('ew-p')?.value||'ppg';const no=gv('ew-no')||'';
    const iv=S.mData.starVal||0;
    const wi=S.dd[S.mData.wkIso]?.weekIdx;
    if(wi!==undefined) Object.keys(S.dd).filter(k=>S.dd[k].weekIdx===wi).forEach(k=>{S.dd[k]={...S.dd[k],phase:ph,notes:no,intensite:iv};});
    S.modal=null;save();R();
  });
  // calendrier
  document.querySelectorAll('[data-editday]').forEach(el=>el.addEventListener('click',()=>{S.modal='editDay';S.mData={dayIso:el.dataset.editday};R();}));
  q('btn-cancelday',()=>{S.modal=null;R();});
  q('btn-saveday',()=>{
    const ph=document.getElementById('ed-p')?.value||'';
    const hs=document.getElementById('ed-s')?.value==='1';
    const no=gv('ed-no')||'';
    const iv=S.mData.starVal||0;
    const wi=S.dd2[S.mData.dayIso]?.weekIdx;
    if(wi!==undefined) Object.keys(S.dd2).filter(k=>S.dd2[k].weekIdx===wi).forEach(k=>{S.dd2[k]={...S.dd2[k],phase:ph,notes:no,intensite:iv};});
    S.dd2[S.mData.dayIso]={...S.dd2[S.mData.dayIso],hasSession:hs};
    S.modal=null;save();R();
  });
}
function q(id,fn){const el=document.getElementById(id);if(el) el.addEventListener('click',fn);}
function gv(id){return document.getElementById(id)?.value||'';}

R();
</script>
