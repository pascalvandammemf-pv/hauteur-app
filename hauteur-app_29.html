<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Saut en hauteur — Planning coach</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#E8EAF0;color:#12131A;font-size:15px}
:root{
  --ppg:#4338CA;--ppg-bg:#DDD8FF;--ppg-bd:#8B85E8;--ppg-tx:#312E81;
  --ppo:#15803D;--ppo-bg:#BBFFD8;--ppo-bd:#4ADE80;--ppo-tx:#14532D;
  --pps:#C2410C;--pps-bg:#FFD8C0;--pps-bd:#FB923C;--pps-tx:#7C2D12;
  --comp:#B45309;--comp-bg:#FDE68A;--comp-bd:#F59E0B;--comp-tx:#78350F;
  --rest:#4B5563;--rest-bg:#D1D5DB;--rest-bd:#9CA3AF;--rest-tx:#1F2937;
  --blue:#1D4ED8;--blue-dark:#1E40AF;
  --bg:#E8EAF0;--bg2:#F4F5FA;--bg3:#ECEEF5;--bg4:#DFE1EC;
  --border:#C8CAD8;--border2:#A8AAC0;
  --text:#12131A;--text2:#383848;--text3:#686880;
}
.layout{display:flex;min-height:100vh}
.sidebar{width:224px;background:#1e1e2e;border-right:1px solid #2a2a3a;display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
.logo{padding:20px 18px 16px;border-bottom:1px solid #2a2a3a}
.logo-t{font-size:14px;font-weight:700;color:#ffffff;letter-spacing:-.2px}
.logo-s{font-size:11px;color:#7070a0;margin-top:3px;letter-spacing:.02em}
.nav-sec{font-size:10px;font-weight:600;color:#555570;letter-spacing:.08em;text-transform:uppercase;padding:16px 18px 5px}
.nav-it{display:flex;align-items:center;gap:10px;padding:10px 18px;font-size:13px;font-weight:500;color:#a0a0c0;cursor:pointer;border-left:2px solid transparent;transition:all .12s;user-select:none}
.nav-it:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-it.on{color:#7EAAFF;background:rgba(94,147,255,.12);border-left-color:#7EAAFF}
.nav-ic{width:15px;height:15px;flex-shrink:0;opacity:.8}
.nav-it.on .nav-ic{opacity:1}
.main{flex:1;padding:32px 36px;overflow-y:auto;max-width:1100px}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:10px}
.pt{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.4px}
.btn{padding:9px 18px;border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);transition:all .12s;font-family:inherit;letter-spacing:-.1px}
.btn:hover{background:var(--bg4);border-color:var(--border2);color:var(--text)}
.btn-p{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-p:hover{background:#3a8af0;border-color:#3a8af0}
.btn-d{color:#f06060;border-color:#4a2020}
.btn-d:hover{background:#2a1010}
.card{background:#F4F5FA;border:1px solid var(--border);border-radius:14px;padding:22px 26px;margin-bottom:14px}
.bdg{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:99px;letter-spacing:.02em}
.bdg-ppg{background:var(--ppg-bg);color:var(--ppg-tx);border:1px solid var(--ppg-bd)}
.bdg-ppo{background:var(--ppo-bg);color:var(--ppo-tx);border:1px solid var(--ppo-bd)}
.bdg-pps{background:var(--pps-bg);color:var(--pps-tx);border:1px solid var(--pps-bd)}
.bdg-comp{background:var(--comp-bg);color:var(--comp-tx);border:1px solid var(--comp-bd)}
.bdg-rest{background:var(--rest-bg);color:var(--rest-tx);border:1px solid var(--rest-bd)}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
.sc{background:#F4F5FA;border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.sv{font-size:26px;font-weight:700;color:var(--text);letter-spacing:-.5px}
.sl2{font-size:10px;color:var(--text3);margin-top:4px;font-weight:500;letter-spacing:.04em;text-transform:uppercase}
.ac{background:#F4F5FA;border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;text-align:center;transition:all .12s;margin-bottom:8px}
.ac:hover{border-color:var(--border2);background:var(--bg3)}
.ac.on{border:2px solid var(--blue);background:#DDEAFF}
.av{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;margin:0 auto 10px}
.av-b{background:#1A3A6A;color:#7BB8F8}
.av-c{background:#3A1820;color:#F48090}
.av-t{background:#0A2E20;color:#60D4A0}
.av-p{background:#28204A;color:#B4A0F8}
.pl{display:grid;grid-template-columns:230px 1fr;gap:16px}
.sec-lbl{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:12px}
.ig{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.ib{background:#E8EAF0;border-radius:9px;padding:11px 14px;border:1px solid var(--border)}
.il{font-size:10px;color:var(--text3);margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.05em}
.iv{font-size:15px;font-weight:600;color:var(--text)}
.prr{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#E8EAF0;border-radius:9px;margin-bottom:6px;border:1px solid var(--border)}
.prv{font-size:14px;font-weight:700;color:var(--blue)}
.tabs{display:flex;gap:2px;margin-bottom:22px;border-bottom:1px solid var(--border)}
.tab{padding:10px 18px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s;font-family:inherit}
.tab:hover{color:var(--text)}
.tab.on{color:var(--blue);border-bottom-color:var(--blue)}
.wg{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.dh{text-align:center;font-size:11px;color:var(--text3);padding:6px 0;font-weight:600;letter-spacing:.04em}
.dc{border-radius:10px;min-height:68px;padding:8px;border:1px solid var(--border);cursor:pointer;background:#ECEEF5;transition:all .12s}
.dc:hover{border-color:var(--border2)}
.dc-ppg{background:var(--ppg-bg);border-color:var(--ppg-bd);border-width:1.5px}
.dc-ppo{background:var(--ppo-bg);border-color:var(--ppo-bd);border-width:1.5px}
.dc-pps{background:var(--pps-bg);border-color:var(--pps-bd);border-width:1.5px}
.dc-comp{background:var(--comp-bg);border-color:var(--comp-bd);border-width:1.5px}
.dc-rest{background:var(--rest-bg);border-color:var(--rest-bd)}
.dc-emp{background:transparent;border-color:transparent;cursor:default}
.dn{font-size:13px;font-weight:600}
.dt{font-size:10px;font-weight:600;margin-top:3px}
.dot{width:5px;height:5px;border-radius:50%;margin:5px auto 0}
.sr{display:flex;align-items:center;gap:12px;padding:12px 16px;background:#ECEEF5;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;transition:all .12s}
.sr:hover{border-color:var(--border2);background:#DFE1EC}
.sd{font-size:12px;color:var(--text3);min-width:76px;flex-shrink:0}
.st{font-size:14px;font-weight:500;flex:1;cursor:pointer;color:var(--text)}
.bb{display:flex;align-items:center;gap:6px;background:transparent;border:none;color:var(--blue);font-size:13px;cursor:pointer;padding:0;margin-bottom:18px;font-weight:500;font-family:inherit}
.eg{gap:10px;margin-top:12px}
.ec{background:#ECEEF5;border:1px solid var(--border);border-radius:12px;overflow:hidden;display:flex;align-items:stretch}
.em{width:100px;min-width:100px;height:auto;min-height:90px;background:#DFE1EC;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;flex-shrink:0}
.em img{width:100%;height:100%;object-fit:cover}
.ep{display:flex;flex-direction:column;align-items:center;gap:5px;color:var(--text3);font-size:11px}
.vb{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.7);color:#fff;font-size:10px;padding:2px 8px;border-radius:99px}
.eb{padding:10px 14px;flex:1}
.en{font-size:13px;font-weight:600;color:var(--text)}
.ed2{font-size:11px;color:var(--text2);margin-top:3px}
.s3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.pb{display:flex;height:6px;border-radius:99px;overflow:hidden;margin-bottom:22px;gap:1px}
.ps{height:100%;border-radius:99px}
.mb{background:#F4F5FA;border:1px solid var(--border);border-radius:14px;padding:20px 24px;margin-bottom:14px}
.mt2{font-size:15px;font-weight:600;color:var(--text);margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;letter-spacing:-.2px}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.ch{text-align:center;font-size:10px;color:var(--text3);padding:5px 0;font-weight:600;letter-spacing:.05em}
.cd{border-radius:8px;min-height:50px;padding:6px;border:1px solid var(--border);cursor:pointer;background:#ECEEF5;transition:all .12s}
.cd:hover{border-color:var(--border2)}
.cd-ppg{background:var(--ppg-bg);border-color:var(--ppg-bd);border-width:1.5px}
.cd-ppo{background:var(--ppo-bg);border-color:var(--ppo-bd);border-width:1.5px}
.cd-pps{background:var(--pps-bg);border-color:var(--pps-bd);border-width:1.5px}
.cd-comp{background:var(--comp-bg);border-color:var(--comp-bd);border-width:1.5px}
.cd-rest{background:var(--rest-bg);border-color:var(--rest-bd)}
.cd-emp{background:transparent;border-color:transparent;cursor:default}
.today{outline:2px solid var(--blue);outline-offset:1px;border-radius:8px}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;backdrop-filter:blur(6px)}
.md{background:#F4F5FA;border:1px solid var(--border2);border-radius:18px;padding:28px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto}
.mdtt{font-size:17px;font-weight:700;margin-bottom:22px;color:var(--text);letter-spacing:-.3px}
.fg{margin-bottom:16px}
.fg label{font-size:11px;color:var(--text3);display:block;margin-bottom:6px;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 13px;border:1px solid var(--border2);border-radius:9px;font-size:14px;color:var(--text);background:#ffffff;outline:none;transition:border .12s;font-family:inherit}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--blue)}
.fg input::placeholder{color:var(--text3)}
.fg textarea{resize:vertical;min-height:70px}
.fg select option{background:#fff;color:#18181f}
.fgr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.br{display:flex;gap:10px;margin-top:10px}
.uz{border:1.5px dashed var(--border2);border-radius:9px;padding:14px;text-align:center;cursor:pointer;font-size:13px;color:var(--text3);transition:all .12s;display:block;width:100%;background:#fff}
.uz:hover{background:var(--bg3);border-color:var(--blue)}
.ip{width:100%;height:88px;object-fit:cover;border-radius:8px;margin-top:8px}
.warn{background:#FFE8E8;border:1px solid #FCA5A5;border-radius:9px;padding:14px;margin-bottom:16px;font-size:13px;color:#991B1B;line-height:1.6}
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty p{font-size:14px;margin-bottom:6px}
@media(max-width:768px){
  .sidebar{width:58px}
  .logo-t,.logo-s,.nav-sec,.nav-it span{display:none}
  .nav-it{justify-content:center;padding:14px}
  .main{padding:18px 14px}
  .sg{grid-template-columns:repeat(2,1fr)}
  .pl{grid-template-columns:1fr}
  .eg{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
function lsGet(k,def){try{const v=localStorage.getItem(k);return v?JSON.parse(v):def();}catch{return def();}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function iso(d){const r=new Date(d);return r.getFullYear()+'-'+('0'+(r.getMonth()+1)).slice(-2)+'-'+('0'+r.getDate()).slice(-2);}
function addD(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function monOf(d){const r=new Date(d);const dw=r.getDay();r.setDate(r.getDate()+(dw===0?-6:1-dw));return r;}
function calcAge(dob){const d=new Date(dob),n=new Date();let a=n.getFullYear()-d.getFullYear();if(n<new Date(n.getFullYear(),d.getMonth(),d.getDate()))a--;return a;}
function ini(p,n){return(p[0]+n[0]).toUpperCase();}
const TODAY=iso(new Date());
const JOURS=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
const MOIS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const AVC=['av-b','av-c','av-t','av-p'];
const PH={ppg:{l:'PPG',col:'#7B74E8'},ppo:{l:'PPO',col:'#2DB87A'},pps:{l:'PPS',col:'#E87040'},comp:{l:'Compét',col:'#E8A030'},rest:{l:'Repos',col:'#666'},'':{}};
const CAL_START=new Date('2026-04-20');
const WPLAN=[
  // Avril-Mai : PPG
  {p:'ppg',s:[1,3,5],n:'Force générale'},{p:'ppg',s:[1,3,5],n:'Squat, fentes, gainage'},
  {p:'ppg',s:[1,3,6],n:'Plyométrie légère'},{p:'ppg',s:[1,3,5],n:'Transition PPG→PPO'},
  // Mai-Juin : PPO
  {p:'ppo',s:[1,3,5],n:'Sauts en boîte'},{p:'ppo',s:[1,3,5],n:'Force orientée'},
  {p:'ppo',s:[2,4,6],n:'Appui Fosbury'},{p:'rest',s:[],n:'Récupération active'},
  {p:'ppo',s:[1,3,5],n:'PPO + intro PPS'},{p:'pps',s:[1,3,5,6],n:'Approche, impulsion'},
  // Juin-Juillet : PPS
  {p:'pps',s:[1,3,5,6],n:'Approche complète'},{p:'pps',s:[1,3,5,6],n:'Essais progressifs'},
  {p:'pps',s:[1,3,5],n:'Affinage technique'},{p:'comp',s:[3,6],n:'Compétition + récup'},
  {p:'pps',s:[1,3,5],n:'Retour post-compét'},{p:'comp',s:[6],n:'Compétition principale'},
  {p:'rest',s:[],n:'Repos, bilan saison'},
  // Août : Reprise
  {p:'rest',s:[],n:'Repos actif'},{p:'ppg',s:[1,3,5],n:'Reprise PPG'},
  {p:'ppg',s:[1,3,5],n:'Renforcement général'},{p:'ppg',s:[1,3,6],n:'Force + mobilité'},
  // Septembre : PPG → PPO
  {p:'ppg',s:[1,3,5],n:'Plyométrie'},{p:'ppo',s:[1,3,5],n:'PPO automne'},
  {p:'ppo',s:[1,3,5],n:'Force orientée'},{p:'ppo',s:[2,4,6],n:'Technique Fosbury'},
  // Octobre : PPO → PPS
  {p:'rest',s:[],n:'Récupération'},{p:'ppo',s:[1,3,5],n:'PPO consolidation'},
  {p:'pps',s:[1,3,5,6],n:'PPS approche'},{p:'pps',s:[1,3,5,6],n:'Travail barre'},
  // Novembre : PPS + Compét indoor
  {p:'pps',s:[1,3,5],n:'Affinage indoor'},{p:'comp',s:[3,6],n:'Compétition indoor'},
  {p:'pps',s:[1,3,5],n:'Récup post-compét'},{p:'comp',s:[6],n:'Compétition indoor 2'},
  // Décembre : Coupure
  {p:'rest',s:[],n:'Coupure fin année'},{p:'rest',s:[],n:'Repos actif'},
  {p:'ppg',s:[1,3],n:'Reprise légère'},{p:'ppg',s:[1,3,5],n:'Prépa nouvelle saison'},
  // Janvier : PPG hiver
  {p:'ppg',s:[1,3,5],n:'PPG hiver - Force'},{p:'ppg',s:[1,3,5],n:'Renforcement musculaire'},
  {p:'ppg',s:[1,3,6],n:'Plyométrie hiver'},{p:'rest',s:[],n:'Récupération'},
  // Février : PPO hiver
  {p:'ppo',s:[1,3,5],n:'PPO hiver'},{p:'ppo',s:[1,3,5],n:'Force orientée hiver'},
  {p:'ppo',s:[2,4,6],n:'Technique approche'},{p:'ppo',s:[1,3,5],n:'PPO consolidation'},
  // Mars : PPS + Compét indoor
  {p:'pps',s:[1,3,5,6],n:'PPS indoor'},{p:'pps',s:[1,3,5,6],n:'Affinage indoor'},
  {p:'comp',s:[3,6],n:'Compétition indoor'},{p:'pps',s:[1,3,5],n:'Transition saison ext.'},
];
const DEFLIB=[
  {id:1,name:'Squat',phase:'ppg',sets:4,reps:'8',notes:'70% 1RM',videoUrl:''},
  {id:2,name:'Fentes marchées',phase:'ppg',sets:3,reps:'12/jambe',notes:'',videoUrl:''},
  {id:3,name:'Gainage latéral',phase:'ppg',sets:3,reps:'30s',notes:'',videoUrl:''},
  {id:4,name:'Sauts en boîte',phase:'ppo',sets:4,reps:'6',notes:'Box 60cm',videoUrl:''},
  {id:5,name:'Foulées bondissantes',phase:'ppo',sets:3,reps:'20m',notes:'',videoUrl:''},
  {id:6,name:'Fosbury approche courte',phase:'pps',sets:5,reps:'3 sauts',notes:'Barre 1m70',videoUrl:''},
  {id:7,name:'Impulsion sur haie',phase:'pps',sets:4,reps:'8',notes:'Genou haut',videoUrl:''},
  {id:8,name:'Saut complet',phase:'pps',sets:3,reps:'3 essais',notes:'',videoUrl:''},
];
function buildDD(){
  const data={};let mon=monOf(CAL_START);
  WPLAN.forEach((wp,wi)=>{for(let d=0;d<7;d++){const k=iso(addD(mon,wi*7+d));data[k]={phase:wp.p,hasSession:wp.s.includes(d+1),notes:wp.n,weekIdx:wi};}});
  return data;
}
function bdg(ph){if(!ph||!PH[ph]||!PH[ph].l) return '';return`<span class="bdg bdg-${ph}">${PH[ph].l}</span>`;}
function stars(n,col){
  if(!n) return '';
  const c=col||'#E8C030';
  return Array.from({length:4},(_,i)=>i<n?`<span style="color:${c};font-size:10px">★</span>`:`<span style="color:#B0B4C8;font-size:10px">★</span>`).join('');
}
function starsInput(cur,fieldId){
  const c=cur||0;
  const fid=fieldId||'star-field';
  const labels=['','Légère','Modérée','Intense','Maximale'];
  return`<div style="display:flex;gap:4px;align-items:center;margin-top:6px">
    ${[1,2,3,4].map(n=>`<button type="button" class="star-btn" data-star="${n}" data-field="${fid}" style="font-size:26px;background:none;border:none;cursor:pointer;line-height:1;color:${c>=n?'#D97706':'#B0B4C8'};transition:color .1s;padding:0">${c>=n?'★':'☆'}</button>`).join('')}
    <span style="font-size:12px;color:var(--text3);margin-left:6px">${c?labels[c]:''}</span>
  </div>`;
}

function phOpts(val){
  return['ppg','ppo','pps','comp','rest',''].map(p=>`<option value="${p}"${val===p?' selected':''}>${p==='ppg'?'PPG — Général':p==='ppo'?'PPO — Orienté':p==='pps'?'PPS — Spécifique':p==='comp'?'Compétition':p==='rest'?'Repos':'Non planifié'}</option>`).join('');
}

let S={
  page:'membres',
  athletes:lsGet('h_ath',()=>[]),
  sessions:lsGet('h_ses',()=>[]),
  library:lsGet('h_lib',()=>DEFLIB),
  dd:lsGet('h_dd',buildDD),
  dd2:lsGet('h_dd2',buildDD),
  imgs:lsGet('h_img',()=>({})),
  nAId:lsGet('h_nai',()=>1),
  nSId:lsGet('h_nsi',()=>1),
  nEId:lsGet('h_nei',()=>1),
  nLId:lsGet('h_nli',()=>20),
  selAt:null,selSes:null,modal:null,mData:{},
  collapse:{},libF:'',sesTab:'liste',libPick:false,
  newPrs:[{label:'Meilleur saut',val:''}],
};
function save(){
  lsSet('h_ath',S.athletes);lsSet('h_ses',S.sessions);lsSet('h_lib',S.library);
  lsSet('h_dd',S.dd);lsSet('h_dd2',S.dd2);lsSet('h_img',S.imgs);
  lsSet('h_nai',S.nAId);lsSet('h_nsi',S.nSId);lsSet('h_nei',S.nEId);lsSet('h_nli',S.nLId);
}
function R(){document.getElementById('app').innerHTML=renderApp();bind();}

const ICO={
  users:`<svg class="nav-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="7" r="3"/><path d="M3 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/><path d="M16 3.13a4 4 0 010 7.75"/><path d="M21 21v-2a4 4 0 00-3-3.87"/></svg>`,
  cal:`<svg class="nav-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`,

// ── SÉANCES ───────────────────────────────────────────────────────
function rSeances(){
  if(S.selSes!==null){const s=S.sessions.find(x=>x.id===S.selSes);if(s) return rSesDet(s);}
  const sesMod=S.modal==='newSes'?rSesModal():'';
  const mon=monOf(new Date());
  const dates=Array.from({length:7},(_,i)=>addD(mon,i));
  const calHtml=`<div class="card" style="margin-bottom:16px">
    <div class="sec-lbl" style="margin-bottom:12px">Semaine du ${mon.toLocaleDateString('fr-BE',{day:'2-digit',month:'long'})}</div>
    <div class="wg">${JOURS.map(j=>`<div class="dh">${j}</div>`).join('')}${dates.map(d=>{
      const k=iso(d);const s=S.sessions.find(x=>x.date===k);const ph=s?PH[s.phase]:null;
      const cellIso=iso(d);
    return`<div class="dc${ph?' dc-'+s.phase:''}" 
      ${s?`data-openses="${s.id}" draggable="true" data-drag-sid="${s.id}"`:`data-drop-date="${cellIso}"`}
      data-drop-date="${cellIso}"
      ondragover="event.preventDefault();this.style.outline='2px solid var(--blue)'"
      ondragleave="this.style.outline=''"
      ondrop="dropSession(event,'${cellIso}');this.style.outline=''"
      ondragstart="${s?`dragSession(event,${s.id})`:''}">
      <div class="dn" style="color:${ph?ph.col:'var(--text3)'}">${d.getDate()}</div>
      ${ph?`<div class="dt" style="color:${ph.col}">${ph.l}</div>${s.intensite?`<div style="font-size:9px;line-height:1;margin-top:2px">${stars(s.intensite,ph.col)}</div>`:''}<div class="dot" style="background:${ph.col}"></div>`:''}
    </div>`;
    }).join('')}</div>
  </div>`;
  const sorted=[...S.sessions].sort((a,b)=>a.date.localeCompare(b.date));
  const listHtml=`<div class="card">
    <div class="sec-lbl" style="margin-bottom:14px">Toutes les séances (${S.sessions.length})</div>
    ${sorted.length===0?'<div class="empty"><p>Aucune séance</p><small>Clique sur "+ Séance" pour commencer</small></div>':''}
    ${sorted.map(s=>`<div class="sr">
      <div class="sd">${new Date(s.date+'T12:00:00').toLocaleDateString('fr-BE',{day:'2-digit',month:'short'})}</div>
      <div class="st" data-openses="${s.id}">${s.title}</div>
      ${bdg(s.phase)}
      ${s.intensite?`<span style="flex-shrink:0">${stars(s.intensite)}</span>`:''}
      <div style="font-size:12px;color:var(--text3);flex-shrink:0">${s.exercises.length} ex.</div>
      <button class="btn" style="padding:4px 10px;font-size:12px;flex-shrink:0" data-dupses="${s.id}">Dupliquer</button>
      <button class="btn btn-d" style="padding:4px 10px;font-size:12px;flex-shrink:0" data-delses="${s.id}">×</button>
    </div>`).join('')}
  </div>`;
  return`${sesMod}<div class="ph"><div class="pt">Séances</div><button class="btn btn-p" id="btn-newses">+ Séance</button></div>
  <div class="tabs"><button class="tab${S.sesTab==='liste'?' on':''}" data-sestab="liste">Liste</button><button class="tab${S.sesTab==='cal'?' on':''}" data-sestab="cal">Calendrier semaine</button></div>
  ${S.sesTab==='cal'?calHtml:''}${listHtml}`;
}
function rSesModal(){
  const repeatDays=S.mData.repeatDays||[];

  return`<div class="ov"><div class="md" style="max-width:500px">

    <div class="fg"><label>Notes</label><textarea id="ns-n" placeholder="Objectifs, consignes..."></textarea></div>
    <div class="br"><button class="btn" style="flex:1" onclick="cancelSession()">Annuler</button><button class="btn btn-p" style="flex:1" onclick="saveSession()">Créer la séance</button></div>
  </div></div>`;
}
function rSesDet(s){
  const vidModal=S.modal==='video'?rVideoModal():'';
  const imgModal=S.modal==='viewImg'?`<div class="ov" onclick="S.modal=null;R()" style="cursor:zoom-out;align-items:center;justify-content:center;padding:16px">
    <div onclick="event.stopPropagation()" style="max-width:95vw;max-height:90vh;position:relative">
      <img src="${S.mData.viewImgSrc||''}" alt="${S.mData.viewImgTitle||''}" style="max-width:100%;max-height:85vh;border-radius:12px;display:block;box-shadow:0 20px 60px rgba(0,0,0,.5)"/>
      <div style="position:absolute;top:-36px;right:0;display:flex;align-items:center;gap:10px">
        <span style="color:#fff;font-size:13px;opacity:.8">${S.mData.viewImgTitle||''}</span>
        <button onclick="S.modal=null;R()" style="background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:8px;padding:5px 12px;font-size:13px;cursor:pointer">✕ Fermer</button>
      </div>
    </div>
  </div>`:'';
  const libPickModal=S.libPick?`<div class="ov" id="lp-ov"><div class="md">
    <div class="mdtt">Depuis la bibliothèque</div>
    ${S.library.length===0?'<div style="color:var(--text3);font-size:14px;padding:10px 0">Bibliothèque vide — ajoute des exercices d\'abord.</div>':''}
    <div style="display:flex;flex-direction:column;gap:8px;max-height:340px;overflow-y:auto">
      ${S.library.map(ex=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--bg3);border-radius:10px;border:1px solid var(--border)">
        <div><div style="font-size:14px;font-weight:600;color:var(--text)">${ex.name}</div><div style="font-size:12px;color:var(--text3);margin-top:3px">${ex.sets}×${ex.reps} · ${bdg(ex.phase)}</div></div>
        <button class="btn btn-p" style="padding:5px 12px;font-size:12px" data-importex="${ex.id}">Ajouter</button>
      </div>`).join('')}
    </div>
    <div class="br"><button class="btn" style="flex:1" id="btn-closelp">Fermer</button></div>
  </div></div>`:'';
  const editExMod=S.modal==='editEx'?rEditExModal(s.id):'';
  const exMod=S.modal==='newEx'?`<div class="ov"><div class="md">
    <div class="mdtt">Nouvel exercice</div>
    <div class="fg"><label>Nom</label><input id="ne-n" placeholder="ex: Squat"/></div>
    <div class="fgr"><div class="fg"><label>Séries</label><input type="number" id="ne-s" value="0" min="0"/></div><div class="fg"><label>Reps</label><input id="ne-r" placeholder="8"/></div></div>
    <div class="fg"><label>Notes</label><textarea id="ne-no" placeholder="Charge, hauteur, focus..."></textarea></div>
    <div class="fg"><label>Image</label><label class="uz">📎 Choisir une image<input type="file" accept="image/*" id="ne-img" style="display:none"/></label><img id="ne-prev" class="ip" style="display:none"/></div>
    <div class="fg"><label>URL vidéo</label><input id="ne-v" placeholder="https://youtube.com/..."/></div>
    <div class="br"><button class="btn" style="flex:1" id="btn-cancelex">Annuler</button><button class="btn btn-p" style="flex:1" id="btn-saveex">Ajouter</button></div>
  </div></div>`:'';
  const exCards=s.exercises.map(ex=>{
    const img=S.imgs[ex.id];
    let med=img?`<div class="em"><img src="${img}" alt="${ex.name}" onclick="viewImg('${img}','${ex.name}')" style="cursor:zoom-in;width:100%;height:100%;object-fit:cover"/>${ex.videoUrl?`<div class="vb open-vid" data-vidurl="${ex.videoUrl}" data-vidtitle="${ex.name}" data-videxid="${ex.id}" style="cursor:pointer">▶ Vidéo</div>`:''}</div>`
      :ex.videoUrl?`<div class="em open-vid" data-vidurl="${ex.videoUrl}" data-vidtitle="${ex.name}" data-videxid="${ex.id}" style="background:rgba(90,171,255,.10);flex-direction:column;gap:6px;cursor:pointer;transition:background .15s" title="Voir la vidéo"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polygon points="10,8 16,12 10,16" fill="var(--blue)" stroke="none"/></svg><span style="font-size:11px;color:var(--blue);font-weight:600">▶ Voir la vidéo</span></div>`
      :`<div class="em" onclick="editExercise(${s.id},${ex.id})" style="cursor:pointer;flex-direction:column;gap:6px"><div class="ep"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:.4"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg><span style="font-size:10px;color:var(--text3)">Cliquer pour modifier</span></div></div>`;
    return`<div class="ec" draggable="true" 
      ondragstart="dragEx(event,${s.id},${ex.id})"
      ondragover="event.preventDefault();this.style.outline='2px solid var(--blue)'"
      ondragleave="this.style.outline=''"
      ondrop="dropEx(event,${s.id},${ex.id});this.style.outline=''"
      style="cursor:grab">${med}
      <div class="eb" onclick="editExercise(${s.id},${ex.id})" style="cursor:pointer">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:6px">
          <div style="flex:1">
            <div class="en">${ex.name}</div>
            <div class="ed2">${ex.sets||ex.reps?(ex.sets||'—')+'×'+(ex.reps||'—'):''} ${ex.notes?'· '+ex.notes:''}</div>
            ${S.imgs['vid_'+ex.id]?'<div style="font-size:11px;color:var(--ppo-tx);margin-top:3px">✓ Vidéo uploadée</div>':''}
          </div>
          <button onclick="event.stopPropagation();deleteExercise(${s.id},${ex.id})" style="background:none;border:none;cursor:pointer;font-size:14px;padding:2px 4px;color:var(--text3);flex-shrink:0" title="Supprimer">🗑</button>
        </div>
      </div>
    </div>`;
  }).join('');
  return`${imgModal}${vidModal}${libPickModal}${editExMod}${exMod}
  <button class="bb" id="btn-back">← Retour aux séances</button>
  <div class="card">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px">
      <div><div style="font-size:19px;font-weight:700;color:var(--text);letter-spacing:-.3px;margin-bottom:7px">${s.title}</div>
      <div style="font-size:12px;color:var(--text3);display:flex;align-items:center;gap:8px">${new Date(s.date+'T12:00:00').toLocaleDateString('fr-BE',{weekday:'long',day:'numeric',month:'long'})} · ${bdg(s.phase)} ${s.intensite?stars(s.intensite)+'<span style="font-size:11px;color:var(--text3)">'+ ['Légère','Modérée','Intense','Maximale'][s.intensite-1]+'</span>':''}</div></div>
    <button class="btn btn-d" style="padding:6px 14px;font-size:13px;flex-shrink:0" id="btn-delses">🗑 Supprimer</button>
    </div>
    <div class="s3">
      <div class="sc"><div class="sv">${s.exercises.length}</div><div class="sl2">Exercices</div></div>
      <div class="sc"><div class="sv">${s.exercises.reduce((a,e)=>a+e.sets,0)}</div><div class="sl2">Séries tot.</div></div>
      <div class="sc"><div class="sv">${s.exercises.filter(e=>e.videoUrl).length}</div><div class="sl2">Vidéos</div></div>
    </div>
    ${s.notes?`<div style="font-size:13px;color:var(--text2);padding:10px 14px;background:var(--bg3);border-radius:9px;margin-bottom:18px;border:1px solid var(--border)">${s.notes}</div>`:''}
    <div class="sec-lbl" style="margin-bottom:4px">Exercices</div>
    <div class="eg" style="display:flex;flex-direction:column;gap:8px">${exCards.length?exCards:'<div class="empty" style="grid-column:1/-1"><p>Aucun exercice</p><small>Ajoute des exercices ci-dessous</small></div>'}</div>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn" style="flex:1" id="btn-fromlib">📚 Depuis bibliothèque</button>
      <button class="btn btn-p" style="flex:1" id="btn-newex">+ Exercice manuel</button>
    </div>
  </div>`;
}

  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px">

// ── CALENDRIER ────────────────────────────────────────────────────

  const c=countPhD(S.dd2);
  const calMs=buildCalMs(S.dd2);
  const dayMod=S.modal==='editDay'?rDayMod():'';
  return`${dayMod}<div class="ph">
    <div class="pt">Calendrier de saison</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">${['ppg','ppo','pps','comp','rest'].map(p=>bdg(p)).join('')}</div>
  </div>
  <div class="sg">
    <div class="sc"><div class="sv">${WPLAN.length}</div><div class="sl2">Semaines</div></div>
    <div class="sc"><div class="sv" style="color:var(--ppg)">${c.ppg}</div><div class="sl2">PPG</div></div>
    <div class="sc"><div class="sv" style="color:var(--ppo)">${c.ppo}</div><div class="sl2">PPO</div></div>
    <div class="sc"><div class="sv" style="color:var(--pps)">${c.pps}</div><div class="sl2">PPS</div></div>
  </div>
  <div class="pb">${segs}</div>
  ${calMs.map(m=>{
    const fd=new Date(m.y,m.m,1).getDay();const off=fd===0?6:fd-1;
    const dim=new Date(m.y,m.m+1,0).getDate();
    let cells='';
    for(let i=0;i<off;i++) cells+=`<div class="cd cd-emp"></div>`;
    for(let day=1;day<=dim;day++){
      const k=iso(new Date(m.y,m.m,day));const dd=S.dd2[k];const ph=dd?PH[dd.phase]:null;
      const realSes=S.sessions.filter(x=>x.date===k);
      const sesPh=realSes.length?PH[realSes[0].phase]:null;
      const dispPh=sesPh||ph;
      cells+=`<div class="cd${sesPh?' cd-'+realSes[0].phase:ph?' cd-'+dd.phase:''}${k===TODAY?' today':''}" ${dd?`data-editday="${k}"`:''}style="min-height:50px;position:relative">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div style="font-size:12px;font-weight:600;color:${dispPh?dispPh.col:'var(--text3)'}">${day}</div>
          ${ph&&dd.phase?`<button class="del-day-btn" data-delday="${k}" style="font-size:11px;background:none;border:none;cursor:pointer;color:${ph?ph.col:'#aaa'};line-height:1;padding:0;opacity:0.5" title="Effacer">×</button>`:''}
        </div>
        ${dispPh&&(sesPh||dd.phase)?`<div style="font-size:9px;font-weight:700;color:${dispPh.col};margin-top:1px">${dispPh.l}</div>`:''}
        ${realSes.length?`<div style="font-size:9px;color:${sesPh?sesPh.col:'#888'};margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${realSes.map(x=>x.title.split('—')[0].trim().substring(0,10)).join(', ')}</div>`:''}
        ${realSes.length&&realSes[0].intensite?`<div style="font-size:9px;line-height:1;margin-top:1px">${stars(realSes[0].intensite,sesPh?sesPh.col:'#E8C030')}</div>`:(!realSes.length&&dd&&dd.intensite)?`<div style="font-size:9px;line-height:1;margin-top:2px">${stars(dd.intensite,ph?ph.col:'#E8C030')}</div>`:realSes.length?`<div class="dot" style="background:${sesPh?sesPh.col:'#888'}"></div>`:''}
      </div>`;
    }
    return`<div class="mb">
      <div class="mt2" style="cursor:default">${MOIS[m.m]} ${m.y}</div>
      <div class="cg">${JOURS.map(j=>`<div class="ch">${j}</div>`).join('')}${cells}</div>
    </div>`;
  }).join('')}`;
}

// ── UTILS ─────────────────────────────────────────────────────────
function buildWeeks(){const ws=[];let mon=monOf(CAL_START);const end=addD(CAL_START,WPLAN.length*7+7);let wn=1;while(mon<end){ws.push({id:iso(mon),wn,mon:new Date(mon)});mon=addD(mon,7);wn++;}return ws;}
function groupMonths(weeks){const ms=[];let cur=null;weeks.forEach(w=>{const m=w.mon.getMonth(),y=w.mon.getFullYear(),k=`${y}-${m}`;if(!cur||cur.key!==k){cur={key:k,label:w.mon.toLocaleDateString('fr-BE',{month:'long',year:'numeric'}),weeks:[]};ms.push(cur);}cur.weeks.push(w);});return ms;}
function buildCalMs(dd){const ms=[];let cur=null;Object.keys(dd).sort().forEach(k=>{const d=new Date(k+'T12:00:00'),m=d.getMonth(),y=d.getFullYear(),key=`${y}-${m}`;if(!cur||cur.key!==key){cur={key,y,m};ms.push(cur);}});return ms;}
function countPh(weeks,dd){const c={ppg:0,ppo:0,pps:0,comp:0,rest:0};const seen=new Set();weeks.forEach(w=>{const d=dd[iso(w.mon)];if(d&&!seen.has(d.weekIdx)){seen.add(d.weekIdx);if(c[d.phase]!==undefined)c[d.phase]++;}});return c;}
function countPhD(dd){const c={ppg:0,ppo:0,pps:0,comp:0,rest:0};const seen=new Set();Object.values(dd).forEach(d=>{if(!seen.has(d.weekIdx)){seen.add(d.weekIdx);if(c[d.phase]!==undefined)c[d.phase]++;}});return c;}
function getPrs(){const w=document.getElementById('prs-wrap');if(!w) return[];const rows=w.querySelectorAll('.fgr');const prs=[];rows.forEach((_,i)=>{const l=document.getElementById(`prl-${i}`);const vv=document.getElementById(`prv-${i}`);if(l&&vv&&l.value.trim()) prs.push({label:l.value.trim(),val:vv.value.trim()});});return prs;}
function addPrRow(){const w=document.getElementById('prs-wrap');if(!w) return;const i=w.querySelectorAll('.fgr').length;const d=document.createElement('div');d.className='fgr';d.style.marginBottom='8px';d.innerHTML=`<input id="prl-${i}" placeholder="Label"/><input id="prv-${i}" placeholder="1m80"/>`;w.appendChild(d);}


function getYtId(url){
  if(!url) return null;
  const m=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);
  return m?m[1]:null;
}
function getEmbedUrl(url){
  if(!url) return null;
  const ytId=getYtId(url);
  if(ytId) return `https://www.youtube.com/embed/${ytId}?rel=0`;
  const vi=url.match(/vimeo\.com\/(?:video\/)?(\d+)/);
  if(vi) return `https://player.vimeo.com/video/${vi[1]}`;
  return null;
}
function getThumb(url){
  const ytId=getYtId(url);
  if(ytId) return `https://img.youtube.com/vi/${ytId}/mqdefault.jpg`;
  return null;
}
function isDirectVideo(url){
  return url&&/\.(mp4|webm|ogg|mov)(\?|$)/i.test(url);
}

  function rPdfTab(){
    return `<div class="card" style="padding:0;overflow:hidden">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:10px">

        </div>
        <a href="${pdfUrl}" download="Point_Inflexion.pdf" class="btn btn-p" style="text-decoration:none;font-size:13px">&#8659; Télécharger</a>

  function rCalcTab(){
    const athl=S.mData.calcAthl||'';
    const foulees=S.mData.calcF||5;
    const longueur=S.mData.calcL||193;
    const angle=S.mData.calcA||30;
    const xstd=S.mData.calcX||91;
    const ystd=S.mData.calcY||30;
    // Formulas from Excel: B14=B6*B5/(B7*PI()/180), B17=B9+B14*(sin-sin0), B18=B8+B14*(1-cos)
    const rayon=longueur*foulees/(angle*Math.PI/180);
    const arcLen=longueur*foulees;
    const xi=Math.round((xstd+rayon*(Math.sin(angle*Math.PI/180)-Math.sin(0)))*10)/10;
    const yi=Math.round((ystd+rayon*(1-Math.cos(angle*Math.PI/180)))*10)/10;
    const valid=xi>0&&yi>0;
    return `<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div class="card" style="margin-bottom:0">
        <div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px">
          ✏️ Variables d&#39;entrée
        </div>
        <div class="fg">
          <label>Nom de l&#39;athlète</label>
          <input id="calc-athl" value="${athl}" placeholder="Prénom Nom" oninput="calcUpdate()"/>
        </div>
        <div class="fg">
          <label>Longueur de foulée sur courbe (cm)</label>
          <input type="range" id="calc-l" min="120" max="230" value="${longueur}" oninput="calcUpdate()" style="width:100%;margin-bottom:4px"/>
          <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text3)">
            <span>120 cm</span><strong id="calc-l-val" style="color:var(--text);font-size:14px">${longueur} cm</strong><span>230 cm</span>
          </div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px">Fém. typique: 150–180 cm · Masc. typique: 180–210 cm</div>
        </div>
        <div class="fg">
          <label>Nombre de foulées sur la courbe</label>
          <input type="range" id="calc-f" min="3" max="7" step="1" value="${foulees}" oninput="calcUpdate()" style="width:100%;margin-bottom:4px"/>
          <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text3)">
            <span>3</span><strong id="calc-f-val" style="color:var(--text);font-size:14px">${foulees} foulées</strong><span>7</span>
          </div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px">Recommandé : 5 (optimal biomécanique)</div>
        </div>
        <div class="fg">
          <label>Angle d&#39;impulsion (degrés)</label>
          <input type="range" id="calc-a" min="10" max="40" value="${angle}" oninput="calcUpdate()" style="width:100%;margin-bottom:4px"/>
          <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text3)">
            <span>10°</span><strong id="calc-a-val" style="color:var(--text);font-size:14px">${angle}°</strong><span>40°</span>
          </div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px">Recommandé : 15–30° (jamais 0° !</div>
        </div>
        <div class="fg-row">
          <div class="fg">
            <label>XSTD — dist. pied / standard (cm)</label>
            <input type="number" id="calc-x" value="${xstd}" min="0" max="200" oninput="calcUpdate()" style="font-size:16px;font-weight:700"/>
            <div style="font-size:11px;color:var(--text3);margin-top:2px">Fém: 30–50 · Masc: 50–75</div>
          </div>
          <div class="fg">
            <label>YSTD — dist. perp. / barre (cm)</label>
            <input type="number" id="calc-y" value="${ystd}" min="0" max="200" oninput="calcUpdate()" style="font-size:16px;font-weight:700"/>
            <div style="font-size:11px;color:var(--text3);margin-top:2px">Fém: 75–90 · Masc: 90–110</div>
          </div>
        </div>
      </div>

function saveSession(){
  const t=document.getElementById('ns-t')?.value.trim();if(!t) return;
  const baseDate=document.getElementById('ns-d')?.value||iso(new Date());
  const p=document.getElementById('ns-p')?.value||'ppg';
  const n=document.getElementById('ns-n')?.value||'';
  const iv=S.mData.starVal||0;
  const repeatDays=S.mData.repeatDays||[];
  S.sessions.push({id:S.nSId,date:baseDate,title:t,phase:p,notes:n,intensite:iv,exercises:[]});
  S.nSId++;
  if(repeatDays.length>0){
    const base=new Date(baseDate+'T12:00:00');
    const baseDow=base.getDay()===0?7:base.getDay();
    const weekMon=new Date(base);weekMon.setDate(base.getDate()-(baseDow-1));
    repeatDays.forEach(dow=>{
      if(dow===baseDow) return;
      const d2=new Date(weekMon);d2.setDate(weekMon.getDate()+(dow-1));
      S.sessions.push({id:S.nSId,date:iso(d2),title:t,phase:p,notes:n,intensite:iv,exercises:[]});
      S.nSId++;
    });
  }
  S.mData.repeatDays=[];S.mData.starVal=0;
  S.modal=null;save();R();
}
function cancelSession(){S.modal=null;S.mData.starVal=0;S.mData.repeatDays=[];R();}
function toggleRepeatDay(day){
  const rd=S.mData.repeatDays||[];
  const idx=rd.indexOf(day);
  if(idx>=0) rd.splice(idx,1); else rd.push(day);
  S.mData.repeatDays=[...rd];
  document.querySelectorAll('.day-repeat-btn').forEach(b=>{
    const d=parseInt(b.dataset.day);
    const on=S.mData.repeatDays.includes(d);
    b.style.border='1.5px solid '+(on?'var(--blue)':'var(--border2)');
    b.style.background=on?'var(--blue)':'var(--bg3)';
    b.style.color=on?'#fff':'var(--text2)';
  });
}

function dragSession(event, sid){
  event.dataTransfer.setData('text/plain', String(sid));
  event.dataTransfer.effectAllowed='move';
}
function dropSession(event, targetDate){
  event.preventDefault();
  const sid=parseInt(event.dataTransfer.getData('text/plain'));
  if(!sid||!targetDate) return;
  // Check no session already on target date
  const existing=S.sessions.find(x=>x.date===targetDate&&x.id!==sid);
  if(existing){
    if(!confirm('Il y a déjà une séance ce jour. Remplacer ?')) return;
    S.sessions=S.sessions.filter(x=>x.id!==existing.id);
  }
  S.sessions=S.sessions.map(x=>x.id===sid?{...x,date:targetDate}:x);
  save();R();
}

function dragEx(event, sid, exId){
  event.stopPropagation();
  event.dataTransfer.setData('text/plain', JSON.stringify({type:'ex',sid,exId}));
  event.dataTransfer.effectAllowed='move';
}
function dropEx(event, sid, targetExId){
  event.preventDefault();
  event.stopPropagation();
  try{
    const data=JSON.parse(event.dataTransfer.getData('text/plain'));
    if(data.type!=='ex'||data.sid!==sid) return;
    if(data.exId===targetExId) return;
    const s=S.sessions.find(x=>x.id===sid);if(!s) return;
    const fromIdx=s.exercises.findIndex(e=>e.id===data.exId);
    const toIdx=s.exercises.findIndex(e=>e.id===targetExId);
    if(fromIdx<0||toIdx<0) return;
    const exes=[...s.exercises];
    const [moved]=exes.splice(fromIdx,1);
    exes.splice(toIdx,0,moved);
    S.sessions=S.sessions.map(x=>x.id===sid?{...x,exercises:exes}:x);
    save();R();
  }catch(e){}
}

function calcUpdate(){
  S.mData.calcAthl=document.getElementById('calc-athl')?.value||'';
  S.mData.calcL=parseInt(document.getElementById('calc-l')?.value||193);
  S.mData.calcF=parseInt(document.getElementById('calc-f')?.value||5);
  S.mData.calcA=parseInt(document.getElementById('calc-a')?.value||30);
  S.mData.calcX=parseInt(document.getElementById('calc-x')?.value||91);
  S.mData.calcY=parseInt(document.getElementById('calc-y')?.value||30);
  // Re-render only the calc content without full R() to avoid losing focus
  const el=document.getElementById('calc-result');
  if(el){
    const f=S.mData.calcF,l=S.mData.calcL,a=S.mData.calcA,x=S.mData.calcX,y=S.mData.calcY;
    const rayon=l*f/(a*Math.PI/180);
    const xi=Math.round((x+rayon*(Math.sin(a*Math.PI/180)))*10)/10;
    const yi=Math.round((y+rayon*(1-Math.cos(a*Math.PI/180)))*10)/10;
    el.innerHTML=xi+' cm';
    const el2=document.getElementById('calc-result-y');
    if(el2) el2.innerHTML=yi+' cm';
    const el3=document.getElementById('calc-result-r');
    if(el3) el3.innerHTML=Math.round(rayon)+' cm';
    const el4=document.getElementById('calc-result-arc');
    if(el4) el4.innerHTML=(l*f)+' cm';
    const el5=document.getElementById('calc-result-name');
    if(el5) el5.innerHTML=S.mData.calcAthl?'&#8212; '+S.mData.calcAthl:'';
    // update displayed slider values
    const lv=document.getElementById('calc-l-val');if(lv)lv.innerHTML=l+' cm';
    const fv=document.getElementById('calc-f-val');if(fv)fv.innerHTML=f+' foulées';
    const av=document.getElementById('calc-a-val');if(av)av.innerHTML=a+'°';
    // update step values in how-to
    const sx=document.getElementById('calc-step-x');if(sx)sx.innerHTML=xi+' cm';
    const sy=document.getElementById('calc-step-y');if(sy)sy.innerHTML=yi+' cm';
  } else {
    R();
  }
}

    const eid=S.nEId;
    S.sessions=S.sessions.map(x=>x.id===S.selSes?{...x,exercises:[...x.exercises,{id:eid,name:n,sets:parseInt(gv('ne-s')||'0'),reps:gv('ne-r')||'',notes:gv('ne-no')||'',videoUrl:gv('ne-v')||'',img:''}]}:x);
    const prev=document.getElementById('ne-prev');
    if(prev&&prev.src&&prev.style.display!=='none') S.imgs[eid]=prev.src;
    S.nEId++;S.modal=null;save();R();
  });
  document.querySelectorAll('[data-imgex]').forEach(el=>el.addEventListener('change',e=>{
    const f=e.target.files[0];if(!f) return;const eid=parseInt(el.dataset.imgex);
    const r=new FileReader();r.onload=ev=>{S.imgs[eid]=ev.target.result;save();R();};r.readAsDataURL(f);
  }));
  // bibliothèque
  document.querySelectorAll('[data-libf]').forEach(el=>el.addEventListener('click',()=>{S.libF=el.dataset.libf;R();}));
  q('btn-newlib',()=>{S.modal='newLib';S.mData={};R();});
  q('btn-cancellib',()=>{S.modal=null;R();});
  const lbImg=document.getElementById('lb-img');
  if(lbImg) lbImg.addEventListener('change',e=>{
    const f=e.target.files[0];if(!f) return;
    const r=new FileReader();
    r.onload=ev=>{const p=document.getElementById('lb-prev');if(p){p.src=ev.target.result;p.style.display='block';}};
    r.readAsDataURL(f);
  });
  q('btn-savelib',()=>{
    const n=gv('lb-n');if(!n) return;
    const ex={name:n,phase:document.getElementById('lb-p')?.value||'ppg',sets:parseInt(gv('lb-s')||'0'),reps:gv('lb-r')||'',notes:gv('lb-no')||'',videoUrl:gv('lb-v')||''};
    const newId=S.modal==='newLib'?S.nLId:S.mData.lid;
    if(S.modal==='newLib'){S.library.push({id:S.nLId,...ex});S.nLId++;}
    else{S.library=S.library.map(e=>e.id===S.mData.lid?{...e,...ex}:e);}
    const lbPrev=document.getElementById('lb-prev');
    if(lbPrev&&lbPrev.src&&lbPrev.style.display!=='none') S.imgs['lib_'+newId]=lbPrev.src;
    S.modal=null;save();R();
  });
  document.querySelectorAll('[data-editlib]').forEach(el=>el.addEventListener('click',()=>{S.modal='editLib';S.mData={lid:parseInt(el.dataset.editlib)};R();}));
  document.querySelectorAll('[data-dellib]').forEach(el=>el.addEventListener('click',()=>{if(confirm('Supprimer cet exercice ?')){S.library=S.library.filter(e=>e.id!==parseInt(el.dataset.dellib));save();R();}}));
  // planning
  document.querySelectorAll('[data-collapse]').forEach(el=>el.addEventListener('click',()=>{const k=el.dataset.collapse;S.collapse[k]=!S.collapse[k];R();}));
  document.querySelectorAll('[data-editwk]').forEach(el=>el.addEventListener('click',e=>{
    if(e.target.classList.contains('del-wk-btn')) return;
    S.modal='editWk';S.mData={wkIso:el.dataset.editwk};R();
  }));
  document.querySelectorAll('.del-wk-btn').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation();
    const k=el.dataset.delwk;
    const wi=S.dd[k]?.weekIdx;
    if(wi===undefined) return;
    if(confirm('Effacer cette semaine du planning macro et du calendrier saison ?')){
      // Reset dd (planning macro)
      Object.keys(S.dd).filter(kk=>S.dd[kk].weekIdx===wi).forEach(kk=>{S.dd[kk]={...S.dd[kk],phase:'',notes:'',intensite:0,hasSession:false};});
      // Sync dd2 (calendrier) — same weekIdx
      Object.keys(S.dd2).filter(kk=>S.dd2[kk].weekIdx===wi).forEach(kk=>{S.dd2[kk]={...S.dd2[kk],phase:'',notes:'',intensite:0,hasSession:false};});
      save();R();
    }
  }));
  q('btn-cancelwk',()=>{S.modal=null;R();});
  q('btn-savewk',()=>{
    const ph=document.getElementById('ew-p')?.value||'ppg';const no=gv('ew-no')||'';
    const iv=S.mData.starVal||0;
    const wi=S.dd[S.mData.wkIso]?.weekIdx;
    if(wi!==undefined) Object.keys(S.dd).filter(k=>S.dd[k].weekIdx===wi).forEach(k=>{S.dd[k]={...S.dd[k],phase:ph,notes:no,intensite:iv};});
    S.modal=null;save();R();
  });
  // calendrier
  document.querySelectorAll('[data-editday]').forEach(el=>el.addEventListener('click',e=>{
    if(e.target.classList.contains('del-day-btn')) return;
    S.modal='editDay';S.mData={dayIso:el.dataset.editday};R();
  }));
  document.querySelectorAll('.del-day-btn').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation();
    const k=el.dataset.delday;
    const wi=S.dd2[k]?.weekIdx;
    if(wi===undefined) return;
    if(confirm('Effacer cette semaine du calendrier saison et du planning macro ?')){
      Object.keys(S.dd2).filter(kk=>S.dd2[kk].weekIdx===wi).forEach(kk=>{S.dd2[kk]={...S.dd2[kk],phase:'',notes:'',intensite:0,hasSession:false};});
      Object.keys(S.dd).filter(kk=>S.dd[kk].weekIdx===wi).forEach(kk=>{S.dd[kk]={...S.dd[kk],phase:'',notes:'',intensite:0,hasSession:false};});
      save();R();
    }
  }));
  q('btn-cancelday',()=>{S.modal=null;R();});
  q('btn-saveday',()=>{
    const ph=document.getElementById('ed-p')?.value||'';
    const hs=document.getElementById('ed-s')?.value==='1';
    const no=gv('ed-no')||'';
    const iv=S.mData.starVal||0;
    const wi=S.dd2[S.mData.dayIso]?.weekIdx;
    if(wi!==undefined) Object.keys(S.dd2).filter(k=>S.dd2[k].weekIdx===wi).forEach(k=>{S.dd2[k]={...S.dd2[k],phase:ph,notes:no,intensite:iv};});
    S.dd2[S.mData.dayIso]={...S.dd2[S.mData.dayIso],hasSession:hs};
    S.modal=null;save();R();
  });
}
function q(id,fn){const el=document.getElementById(id);if(el) el.addEventListener('click',fn);}
function gv(id){return document.getElementById(id)?.value||'';}

R();
</script>
</body>
</html>
